<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Scout is a job and company tracker: organize applications on a kanban board (interested → offer), save company research, and keep notes in one focused workspace."
    />
    <link rel="canonical" href="https://scoutboard.xyz/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://scoutboard.xyz/" />
    <meta property="og:title" content="Scout — Job &amp; company tracking board" />
    <meta
      property="og:description"
      content="Track job applications and companies in one place. Kanban board, company cards, interview notes—built for a calm job search."
    />
    <meta property="og:site_name" content="Scout" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Scout — Job &amp; company tracking board" />
    <meta
      name="twitter:description"
      content="Track job applications and companies in one place. Kanban board, company cards, interview notes—built for a calm job search."
    />
    <!-- SF Pro: use system stack (-apple-system on Apple = SF Pro); no webfont needed on macOS/iOS -->
    <title>Scout — Job &amp; company tracking board</title>
    <style>
      @keyframes scout-overlay-fade {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes scout-modal-in {
        from { opacity: 0; transform: scale(0.96); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes scout-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      .scout-overlay { animation: scout-overlay-fade 0.22s ease-out; }
      .scout-modal { animation: scout-modal-in 0.28s cubic-bezier(0.22, 1, 0.36, 1); }
      /* 13–16 inch screens: columns flex to fill width, no horizontal scroll */
      @media (min-width: 1280px) and (max-width: 1920px) {
        .kanban-scroll-container { overflow-x: hidden !important; }
        .kanban-header-row,
        .kanban-scroll-row { width: 100% !important; min-width: 0 !important; }
        .kanban-column { flex: 1 1 0% !important; min-width: 0 !important; width: auto !important; }
      }
      /* Outside 13–16 inch range: fixed column widths, horizontal scroll */
      @media (max-width: 1279px), (min-width: 1921px) {
        .kanban-header-row,
        .kanban-scroll-row { width: max-content !important; min-width: 100% !important; }
        .kanban-column { flex: 0 0 auto !important; min-width: 300px !important; width: 300px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
